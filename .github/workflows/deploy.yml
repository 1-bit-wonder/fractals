name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the deploy-pages action needs.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent Pages deployment. Do NOT cancel in-progress runs:
# cancelling a live production deployment makes deploy-pages report
# "Deployment cancelled", so let in-flight deploys finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build # asc -> build/fractals.wasm, tsc -> dist/

      # Ensures the Pages site is configured for the GitHub Actions build type.
      # Without this, deployments can sit in `deployment_queued` forever because
      # the site is still in "Deploy from a branch" (legacy) mode.
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Assemble static site
        run: |
          mkdir -p _site
          cp index.html styles.css _site/
          cp -r dist build _site/
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
