name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One Pages deploy at a time. Do NOT cancel in-progress runs (cancelling a
# live deployment makes deploy-pages error). If a run ever wedges, cancel it
# manually in the Actions tab so it stops holding this group.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build # asc -> build/fractals.wasm, tsc -> dist/

      # No `enablement` here: the Pages source is set to "GitHub Actions" once
      # in the repo UI. Flipping the build type from CI can leave the first
      # deployment stuck in `deployment_queued` while the site re-provisions.
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Assemble static site
        run: |
          mkdir -p _site
          cp index.html styles.css _site/
          cp -r dist build _site/
          touch _site/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # The deploy job needs its own permissions; top-level grants don't reliably
    # propagate to a job with an attached environment.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
